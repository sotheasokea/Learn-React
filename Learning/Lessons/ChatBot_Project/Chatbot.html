<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="Asset\ChatBot-web-logo.png">
  </head>
  <body>
    <div class="js-container">
      <input type="text" name="" id="">
    </div>

    <!-- using external Library -->
    <script src="https://unpkg.com/supersimpledev@3.2.1/external-library.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <!-- for bot to respond -->
    <script src="https://unpkg.com/supersimpledev/chatbot.js" ></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script type="text/babel">
      function ChatInput({chatMessages, setChatMessages}){
        const [inputText, setInputText] = React.useState('');
        function saveInputText(event){
          setInputText(event.target.value);
          // console.log(inputText);
        }
        function handleKeyDown(event){
          if(event.key === "Enter"){
            SendMessage();
          }else if(event.key === "Escape"){
            setInputText('');
          }
        }
        async function SendMessage(){
          const newMessage = [
            ...chatMessages,
            {
              message: inputText,
              sender : "user",
              id : crypto.randomUUID()
            }
          ];

          // check if the user input anything in the input box
          const checkMessage = (inputText.trim()).length;
          if(checkMessage === 0){
            return;
          }
          
          setChatMessages(newMessage);
          
          setInputText('');
          setChatMessages([
            ...newMessage,
            {
              message: <img 
                className="gif-loading"
                src="Asset\loading-spinner.gif"
              />,
              sender : "robot",
              id : crypto.randomUUID()
            }
          ]);
          const respond = await Chatbot.getResponseAsync(inputText);
          console.log(respond);

          setChatMessages([
            ...newMessage,
            {
              message: respond,
              sender : "robot",
              id : crypto.randomUUID()
            }
          ]);
        }
        return (
          <div className = "chat-input-container">
            <input 
              placeholder = "Send a message to Chatbot" 
              size = "30" 
              onChange = {saveInputText}
              value = {inputText}
              onKeyDown = {handleKeyDown}
              className = "chat-input"
            />
            <button
              onClick = {SendMessage}
              className = "send-button"
            >Send</button>
          </div>
        );
      }

      function ChatMessage({ message, sender}) {
        return (
          <div className = {
            sender === "robot"
            ? "chat-message-robot"
            : "chat-message-user"
          }>
            {
              sender === "robot" && (
                <img src = "Asset\robot-icon.png" className = "chat-message-profile"/>
            )}
            <div className = "chat-message-text">
              {message}
            </div>
            {
              sender === "user" && (
                <img src = "Asset/users-icon.png" className = "chat-message-profile"/>
            )}
          </div>
        );
      }

      function ChatMessages({chatMessages}){

        const chatMessagesRef = React.useRef(null);

        React.useEffect(()=>{
          // console.log('updated');
          const containerElem = chatMessagesRef.current;
          if(containerElem){
            containerElem.scrollTop = containerElem.scrollHeight;
          }
        }, [chatMessages]);

        return (
          <div 
            className = {
              chatMessages.length === 0 
              ? "chat-messages-container-no-chat"
              : "chat-messages-container"
            }
            ref = {chatMessagesRef}
            >
            {
              chatMessages.length === 0
              ? <div
                className="no-chat-text"
              > 
              <img 
                className="website-logo-start"
                src="Asset\ChatBot.png"
              />
              <p>Welcome to the chatbot project! Send a message using the textbox below.</p>
              </div>
              : chatMessages.map((chatMessage)=>{
                return (
                    <ChatMessage 
                      message = {chatMessage.message} 
                      sender = {chatMessage.sender} 
                      key = {chatMessage.id}
                    />
                );
              })
            }
          
          </div>
        );
      }

      function App(){
        const [chatMessages, setChatMessages] = React.useState([])
        return (
          <div className = "app-container">
            <ChatMessages chatMessages = {chatMessages}/>
            <ChatInput
              chatMessages = {chatMessages}
              setChatMessages = {setChatMessages}
            />
          </div>
        );
      }
      
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);

    </script>
  </body>
</html>
