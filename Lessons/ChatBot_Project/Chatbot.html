<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="js-container">
      <input type="text" name="" id="">
    </div>

    <!-- using external Library -->
    <script src="https://unpkg.com/supersimpledev@3.2.1/external-library.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <!-- for bot to respond -->
    <script src="https://unpkg.com/supersimpledev/chatbot.js" ></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script type="text/babel">
      function ChatInput({chatMessages, setChatMessages}){
        const [inputText, setInputText] = React.useState('');
        function saveInputText(event){
          setInputText(event.target.value);
          console.log(inputText);
        }
        function handleKeyDown(event){
          if(event.key === "Enter"){
            SendMessage();
          }else if(event.key === "Escape"){
            setInputText('');
          }
        }
        async function SendMessage(){
          const newMessage = [
            ...chatMessages,
            {
              message: inputText,
              sender : "user",
              id : crypto.randomUUID()
            }
          ];
          
          setChatMessages(newMessage);
          
          setInputText('');
          const respond = await Chatbot.getResponseAsync(inputText);
          console.log(respond);

          setChatMessages([
            ...newMessage,
            {
              message: respond,
              sender : "robot",
              id : crypto.randomUUID()
            }
          ]);
        }
        return (
          <div className = "chat-input-container">
            <input 
              placeholder = "Send a message to Chatbot" 
              size = "30" 
              onChange = {saveInputText}
              value = {inputText}
              onKeyDown = {handleKeyDown}
              className = "chat-input"
            />
            <button
              onClick = {SendMessage}
              className = "send-button"
            >Send</button>
          </div>
        );
      }

      function ChatMessage({ message, sender}) {
        return (
          <div className = {
            sender === "robot"
            ? "chat-message-robot"
            : "chat-message-user"
          }>
            {
              sender === "robot" && (
                <img src = "robot.png" className = "chat-message-profile"/>
            )}
            <div className = "chat-message-text">
              {message}
            </div>
            {
              sender === "user" && (
                <img src = "user.png" className = "chat-message-profile"/>
            )}
          </div>
        );
      }

      function ChatMessages({chatMessages}){

        const chatMessagesRef = React.useRef(null);

        React.useEffect(()=>{
          // console.log('updated');
          const containerElem = chatMessagesRef.current;
          if(containerElem){
            containerElem.scrollTop = containerElem.scrollHeight;
          }
        }, [chatMessages]);

        return (
          <div 
            className = "chat-messages-container"
            ref = {chatMessagesRef}
            >
            {
              chatMessages.map((chatMessage)=>{
                return (
                    <ChatMessage 
                      message = {chatMessage.message} 
                      sender = {chatMessage.sender} 
                      key = {chatMessage.id}
                    />
                );
              })
            }
          
          </div>
        );
      }

      function App(){
        const [chatMessages, setChatMessages] = React.useState([
          {
            message: "hello chatbot",
            sender : "user",
            id : crypto.randomUUID()
          },
          {
            message: "Hello! How are you?",
            sender : "robot",
            id : crypto.randomUUID()
          },
          {
            message: "Can you tell me the date?",
            sender : "user",
            id : crypto.randomUUID()
          },
          {
            message: dayjs().format('DD/MM/YYYY, HH:mm A'),
            sender : "robot",
            id : crypto.randomUUID()
          }
        ])
        return (
          <div className = "app-container">
            <ChatMessages chatMessages = {chatMessages}/>
            <ChatInput
              chatMessages = {chatMessages}
              setChatMessages = {setChatMessages}
            />
          </div>
        );
      }
      
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);

    </script>
  </body>
</html>
